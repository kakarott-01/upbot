name: Mode audit retention

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  retention:
    runs-on: ubuntu-latest
    env:
      MODE_AUDIT_RETENTION_DAYS: 90
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Check localStorage guard exists
        run: npm run mode-audit:check-localstorage-guard

      - name: Run mode-audit retention
        run: npm run mode-audit:run
